<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Babylon Sofa Viewer</title>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

<style>

html,body{
width:100%;
height:100%;
margin:0;
overflow:hidden;
background:#ffffff;
}

#renderCanvas{
width:100%;
height:100%;
touch-action:none;
}

#ui{
position:absolute;
top:20px;
left:20px;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button{
margin:3px;
}

</style>
</head>

<body>

<div id="ui">

<div>
배경 이미지<br>
<input type="file" id="bgInput">
</div>

<br>

<div>
GLB 모델<br>
<input type="file" id="modelInput">
</div>

<br>

<div>
색상
<br>
<button onclick="setColor('red')">Red</button>
<button onclick="setColor('blue')">Blue</button>
<button onclick="setColor('gray')">Gray</button>
</div>

</div>

<canvas id="renderCanvas"></canvas>

<script src="app.js"></script>

</body>
</html>
