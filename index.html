<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>K-Household 3D Viewer</title>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>

<style>

html, body{
width:100%;
height:100%;
margin:0;
overflow:hidden;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
font-family:sans-serif;
}

#renderCanvas{
width:100%;
height:100%;
display:block;
}

#uiPanel{
position:absolute;
top:20px;
left:20px;
z-index:10;
background:rgba(255,255,255,0.9);
padding:15px;
border-radius:8px;
}

select,input{
margin-top:5px;
}

</style>
</head>

<body>

<div id="uiPanel">

<div>
<label>배경 이미지</label><br>
<input type="file" id="bgInput" accept="image/*">
</div>

<br>

<div>
<label>GLB 모델</label><br>
<input type="file" id="modelInput" accept=".glb">
</div>

<br>


  <div>
색상---<br>

<button class="colorBtn" data-color="#EAE6DC" style="background:#EAE6DC;width:25px;height:25px;border-radius:50%;border:1px solid #aaa;"></button>

<button class="colorBtn" data-color="#C9A889" style="background:#C9A889;width:25px;height:25px;border-radius:50%;border:1px solid #aaa;"></button>

<button class="colorBtn" data-color="#6B4E3D" style="background:#6B4E3D;width:25px;height:25px;border-radius:50%;border:1px solid #aaa;"></button>

<button class="colorBtn" data-color="#2E2E2E" style="background:#2E2E2E;width:25px;height:25px;border-radius:50%;border:1px solid #aaa;"></button>

<button class="colorBtn" data-color="#B23A3A" style="background:#B23A3A;width:25px;height:25px;border-radius:50%;border:1px solid #aaa;"></button>

</div>

</div>

<canvas id="renderCanvas"></canvas>

<script src="app.js"></script>

</body>
</html>
