<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>K-Household 3D Viewer</title>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>

<style>

html,body{
width:100%;
height:100%;
margin:0;
overflow:hidden;
font-family:sans-serif;
background-size:cover;
background-position:center;
}

#renderCanvas{
width:100%;
height:100%;
display:block;
}

#uiPanel{
position:absolute;
top:20px;
left:20px;
background:white;
padding:15px;
border-radius:10px;
z-index:10;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.swatches{
display:flex;
gap:10px;
margin-top:10px;
}

.swatch{
width:28px;
height:28px;
border-radius:50%;
cursor:pointer;
border:2px solid #ccc;
}

.swatch.active{
border:3px solid black;
}

</style>

</head>

<body>

<div id="uiPanel">

<div>
<label>배경 이미지</label><br>
<input type="file" id="bgInput" accept="image/*">
</div>

<br>

<div>
<label>GLB 모델</label><br>
<input type="file" id="modelInput" accept=".glb">
</div>

<br>

<div>
<label>색상 선택</label>

<div class="swatches">

<div class="swatch" data-color="#EAE6DC" style="background:#EAE6DC"></div>
<div class="swatch" data-color="#C9A889" style="background:#C9A889"></div>
<div class="swatch" data-color="#6B4E3D" style="background:#6B4E3D"></div>
<div class="swatch" data-color="#2E2E2E" style="background:#2E2E2E"></div>
<div class="swatch" data-color="#B23A3A" style="background:#B23A3A"></div>

</div>

</div>

</div>

<canvas id="renderCanvas"></canvas>

<script src="app.js"></script>

</body>
</html>
